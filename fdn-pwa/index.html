<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FDN Nav">
  <meta name="theme-color" content="#000000">
  <title>FDN Symptom Navigator</title>
  <link rel="manifest" href="./manifest.json">
  <style>
:root {
  /* Safe Areas */
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-right:  env(safe-area-inset-right, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left:   env(safe-area-inset-left, 0px);

  /* Backgrounds - iOS UIColor dark mode equivalents */
  --bg-primary:   #000000;
  --bg-secondary: #1C1C1E;
  --bg-tertiary:  #2C2C2E;
  --bg-glass:     rgba(28, 28, 30, 0.72);

  /* Text */
  --text-primary:   rgba(255, 255, 255, 1.0);
  --text-secondary: rgba(255, 255, 255, 0.55);
  --text-tertiary:  rgba(255, 255, 255, 0.35);

  /* Separators */
  --separator:        rgba(255, 255, 255, 0.12);
  --separator-opaque: #3A3A3C;

  /* Accent */
  --accent:             #007AFF;
  --accent-destructive: #FF3B30;

  /* FDN Panel Colors - preserve exactly */
  --panel-mwp:   #e07c3a;
  --panel-mba:   #3abde0;
  --panel-shp:   #8b5cf6;
  --panel-gimap: #22c55e;
  --panel-cross: #94a3b8;

  /* FDN Cluster Colors - preserve exactly */
  --cluster-a: #ef4444;
  --cluster-b: #f97316;
  --cluster-c: #ec4899;
  --cluster-d: #06b6d4;
  --cluster-e: #fbbf24;

  /* Typography */
  --font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
  --text-xs:   0.6875rem;
  --text-sm:   0.8125rem;
  --text-base: 1rem;
  --text-md:   1.0625rem;
  --text-lg:   1.25rem;
  --text-xl:   1.5rem;
  --text-2xl:  2rem;
  --weight-regular:  400;
  --weight-medium:   500;
  --weight-semibold: 600;
  --weight-bold:     700;
  --tracking-tight:  -0.02em;
  --tracking-normal:  0em;
  --tracking-wide:    0.03em;
  --tracking-caps:    0.06em;

  /* Spacing - 4px base grid */
  --space-1:  0.25rem;
  --space-2:  0.5rem;
  --space-3:  0.75rem;
  --space-4:  1rem;
  --space-5:  1.25rem;
  --space-6:  1.5rem;
  --space-8:  2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;

  /* Border Radius */
  --radius-sm:   8px;
  --radius-md:   12px;
  --radius-lg:   16px;
  --radius-xl:   20px;
  --radius-full: 9999px;

  /* Shadows - dark-background-optimized */
  --shadow-0: none;
  --shadow-1: 0 1px 2px rgba(0,0,0,0.4), 0 0px 1px rgba(0,0,0,0.3);
  --shadow-2: 0 4px 12px rgba(0,0,0,0.5), 0 1px 3px rgba(0,0,0,0.4);
  --shadow-3: 0 16px 40px rgba(0,0,0,0.6), 0 4px 12px rgba(0,0,0,0.5), 0 1px 3px rgba(0,0,0,0.4);

  /* Motion */
  --ease-spring:   cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-snap:     cubic-bezier(0.25, 0.46, 0.45, 0.94);
  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
  --duration-fast:   150ms;
  --duration-normal: 300ms;
  --duration-slow:   450ms;

  /* Layout */
  --touch-target:  44px;
  --max-width:    430px;
  --nav-height:   calc(60px + var(--safe-bottom));
  --header-height: calc(52px + var(--safe-top));
}
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

html, body {
  height: 100%;
  overscroll-behavior: none;
  -webkit-overflow-scrolling: touch;
}

body {
  background-color: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-family);
  font-size: var(--text-base);
  font-weight: var(--weight-regular);
  line-height: 1.4;
  letter-spacing: var(--tracking-normal);
}

button {
  font-family: var(--font-family);
  font-size: var(--text-base);
  border: none;
  background: none;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

input {
  font-family: var(--font-family);
}

svg {
  display: block;
  flex-shrink: 0;
}

p, h1, h2, h3, h4 {
  overflow-wrap: break-word;
}
#app {
  position: relative;
  width: 100%;
  max-width: var(--max-width);
  margin: 0 auto;
  min-height: 100dvh;
  background: var(--bg-primary);
  overflow: hidden;
}

#screen-container {
  position: relative;
  width: 100%;
  min-height: 100dvh;
  padding-bottom: var(--nav-height);
  overflow-y: auto;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
}

.screen {
  width: 100%;
  min-height: 100%;
  background: var(--bg-primary);
}

.section-list {
  list-style: none;
}

.section-header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-2) var(--space-4);
  background: var(--bg-primary);
}

.section-header-label {
  font-size: var(--text-xs);
  font-weight: var(--weight-semibold);
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: var(--tracking-caps);
}

.content-section {
  padding: var(--space-4);
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
}

.pill-grid {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-2);
}

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: var(--space-12) var(--space-6);
  text-align: center;
  color: var(--text-tertiary);
  font-size: var(--text-sm);
  gap: var(--space-3);
}

.detail-heading {
  font-size: var(--text-xl);
  font-weight: var(--weight-bold);
  color: var(--text-primary);
  letter-spacing: var(--tracking-tight);
  line-height: 1.2;
}

.detail-subheading {
  font-size: var(--text-base);
  font-weight: var(--weight-semibold);
  color: var(--text-secondary);
  margin-top: var(--space-4);
  margin-bottom: var(--space-2);
}

.mechanism-tree {
  font-family: var(--font-family);
  font-size: var(--text-sm);
  color: var(--text-secondary);
  line-height: 1.6;
  white-space: pre-line;
  background: var(--bg-tertiary);
  border-radius: var(--radius-md);
  padding: var(--space-4);
}

.interpretation-text {
  font-size: var(--text-base);
  color: var(--text-secondary);
  line-height: 1.6;
}
.top-header {
  position: sticky;
  top: 0;
  z-index: 90;
  height: var(--header-height);
  padding-top: var(--safe-top);
  background: var(--bg-glass);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--separator);
}

.top-header-inner {
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--space-4);
}

.header-title {
  font-size: var(--text-lg);
  font-weight: var(--weight-semibold);
  color: var(--text-primary);
  letter-spacing: var(--tracking-tight);
}

.header-back-btn {
  display: flex;
  align-items: center;
  gap: var(--space-1);
  min-height: var(--touch-target);
  min-width: var(--touch-target);
  padding: 0 var(--space-2);
  color: var(--accent);
  font-size: var(--text-base);
  font-weight: var(--weight-regular);
  background: none;
  border: none;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.header-back-btn:active {
  opacity: 0.6;
}

.search-container {
  padding: var(--space-2) var(--space-4);
  background: var(--bg-primary);
}
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-width: var(--max-width);
  margin: 0 auto;
  height: var(--nav-height);
  padding-bottom: var(--safe-bottom);
  display: flex;
  align-items: stretch;
  background: var(--bg-glass);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-top: 1px solid var(--separator);
  z-index: 100;
}

.tab-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--space-1);
  min-height: var(--touch-target);
  min-width: var(--touch-target);
  border: none;
  background: transparent;
  cursor: pointer;
  color: var(--text-tertiary);
  font-family: var(--font-family);
  font-size: var(--text-xs);
  font-weight: var(--weight-medium);
  transition: color var(--duration-fast) var(--ease-standard);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.tab-item[aria-selected="true"] {
  color: var(--accent);
}

.tab-item:active {
  opacity: 0.7;
}
.list-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: var(--touch-target);
  min-width: var(--touch-target);
  padding: var(--space-3) var(--space-4);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--separator);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: background var(--duration-fast) var(--ease-standard),
              transform var(--duration-fast) var(--ease-standard);
}

.list-row:active {
  transform: scale(0.98);
  background: var(--bg-tertiary);
}

.list-row-label {
  font-size: var(--text-base);
  color: var(--text-primary);
  flex: 1;
}

.list-row-chevron {
  color: var(--text-tertiary);
  flex-shrink: 0;
}

.accordion-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: var(--touch-target);
  min-width: var(--touch-target);
  width: 100%;
  padding: var(--space-3) var(--space-4);
  background: var(--bg-secondary);
  border: none;
  border-bottom: 1px solid var(--separator);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.accordion-header:active {
  background: var(--bg-tertiary);
}

.accordion-title {
  font-size: var(--text-base);
  font-weight: var(--weight-semibold);
  color: var(--text-primary);
}

.accordion-right {
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

.accordion-chevron {
  transition: transform var(--duration-normal) var(--ease-snap);
  display: inline-block;
  color: var(--text-tertiary);
}

.accordion-header[aria-expanded="true"] .accordion-chevron {
  transform: rotate(90deg);
}

.accordion-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 20px;
  height: 20px;
  padding: 0 6px;
  border-radius: var(--radius-full);
  background: var(--accent);
  color: #fff;
  font-size: var(--text-xs);
  font-weight: var(--weight-semibold);
}

.accordion-body {
  display: none;
}

.accordion-body.is-open {
  display: block;
}

.result-group-heading {
  font-size: var(--text-xs);
  font-weight: var(--weight-semibold);
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: var(--tracking-caps);
  padding: var(--space-3) var(--space-4) var(--space-1);
}
.var-pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 28px;
  min-width: var(--touch-target);
  padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-full);
  background: var(--panel-color, var(--panel-cross));
  color: #000000;
  font-family: var(--font-family);
  font-size: var(--text-sm);
  font-weight: var(--weight-semibold);
  white-space: nowrap;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: opacity var(--duration-fast), transform var(--duration-fast) var(--ease-spring);
  border: 2px solid transparent;
}

.var-pill:active {
  opacity: 0.75;
  transform: scale(0.96);
}

.var-pill--cross {
  background: transparent;
  border: 2px dashed var(--panel-color, var(--panel-cross));
  color: var(--panel-color, var(--panel-cross));
}

.cluster-tag {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 28px;
  min-width: var(--touch-target);
  padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-sm);
  background: var(--cluster-color, var(--cluster-a));
  color: #000000;
  font-family: var(--font-family);
  font-size: var(--text-sm);
  font-weight: var(--weight-semibold);
  white-space: nowrap;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: opacity var(--duration-fast);
}

.cluster-tag:active {
  opacity: 0.75;
}

.panel-badge {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-full);
  background: var(--panel-color, var(--panel-cross));
  color: #000000;
  font-size: var(--text-sm);
  font-weight: var(--weight-semibold);
}

.cross-panel-badge {
  display: inline-flex;
  align-items: center;
  padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-full);
  border: 2px dashed var(--panel-cross);
  color: var(--panel-cross);
  font-size: var(--text-xs);
  font-weight: var(--weight-semibold);
  letter-spacing: var(--tracking-caps);
  text-transform: uppercase;
}
.bottom-sheet-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--duration-normal) var(--ease-standard);
}

.bottom-sheet-overlay.is-open {
  opacity: 1;
  pointer-events: auto;
}

.bottom-sheet {
  position: fixed;
  inset: 0;
  top: auto;
  max-height: 92dvh;
  z-index: 201;
  background: var(--bg-secondary);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  box-shadow: var(--shadow-3);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
  padding-bottom: var(--safe-bottom);
  transform: translateY(100%);
  transition: transform var(--duration-slow) var(--ease-spring);
  max-width: var(--max-width);
  margin: 0 auto;
  left: 0;
  right: 0;
}

.bottom-sheet.is-open {
  transform: translateY(0);
}

.sheet-drag-indicator {
  width: 36px;
  height: 5px;
  background: var(--separator-opaque);
  border-radius: var(--radius-full);
  margin: var(--space-2) auto var(--space-1);
  flex-shrink: 0;
}

.sheet-content {
  flex: 1;
  padding: var(--space-4);
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
  overflow-y: auto;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
}

.sheet-header {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding-bottom: var(--space-2);
  border-bottom: 1px solid var(--separator);
}
.alert-banner {
  width: 100%;
  padding: var(--space-4);
  border-radius: var(--radius-md);
  display: flex;
  align-items: flex-start;
  gap: var(--space-3);
}

.alert-banner--destructive {
  background: rgba(255, 59, 48, 0.15);
  border: 1px solid #FF3B30;
  color: #FF3B30;
}

.alert-banner--warning {
  background: rgba(255, 204, 0, 0.12);
  border: 1px solid #FFCC00;
  color: #FFCC00;
}

.alert-icon {
  font-size: var(--text-lg);
  flex-shrink: 0;
  line-height: 1;
}

.alert-body {
  flex: 1;
}

.alert-title {
  font-weight: var(--weight-semibold);
  font-size: var(--text-base);
  line-height: 1.3;
}

.alert-description {
  font-size: var(--text-sm);
  margin-top: var(--space-1);
  opacity: 0.85;
  line-height: 1.5;
}

.search-bar {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  background: var(--bg-tertiary);
  border-radius: var(--radius-full);
  min-height: var(--touch-target);
  padding: var(--space-2) var(--space-4);
  border: 1px solid transparent;
  transition: border-color var(--duration-fast);
}

.search-bar:focus-within {
  border-color: var(--separator-opaque);
}

.search-icon {
  color: var(--text-tertiary);
  flex-shrink: 0;
}

.search-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text-primary);
  font-family: var(--font-family);
  font-size: var(--text-base);
  -webkit-appearance: none;
  appearance: none;
}

.search-input::placeholder {
  color: var(--text-tertiary);
}

.search-clear {
  display: none;
  background: none;
  border: none;
  color: var(--text-tertiary);
  cursor: pointer;
  padding: var(--space-1);
  border-radius: var(--radius-full);
  min-height: var(--touch-target);
  min-width: var(--touch-target);
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
}

.search-clear.is-visible {
  display: flex;
}
@keyframes fade-in {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes scale-in {
  from { opacity: 0; transform: scale(0.95); }
  to   { opacity: 1; transform: scale(1); }
}

.animate-fade-in {
  animation: fade-in var(--duration-normal) var(--ease-snap) forwards;
}

.animate-scale-in {
  animation: scale-in var(--duration-fast) var(--ease-spring) forwards;
}

.screen-enter {
  animation: fade-in var(--duration-normal) var(--ease-snap) forwards;
}

.priority-block {
  padding: var(--space-4);
  border-radius: var(--radius-md);
  background: rgba(239, 68, 68, 0.12);
  border: 1px solid var(--cluster-a);
  color: var(--cluster-a);
  font-size: var(--text-sm);
  font-weight: var(--weight-medium);
  line-height: 1.5;
}

.referral-block {
  padding: var(--space-4);
  border-radius: var(--radius-md);
  background: rgba(251, 191, 36, 0.12);
  border: 1px solid var(--cluster-e);
  color: var(--cluster-e);
  font-size: var(--text-sm);
  font-weight: var(--weight-medium);
  line-height: 1.5;
}

.divider {
  height: 1px;
  background: var(--separator);
  margin: 0 var(--space-4);
}

.spacer-sm { height: var(--space-2); }
.spacer-md { height: var(--space-4); }
.spacer-lg { height: var(--space-8); }

.text-accent { color: var(--accent); }
.text-destructive { color: var(--accent-destructive); }
.text-secondary { color: var(--text-secondary); }
.text-tertiary { color: var(--text-tertiary); }
.font-semibold { font-weight: var(--weight-semibold); }
.font-bold { font-weight: var(--weight-bold); }
.text-sm { font-size: var(--text-sm); }
.text-xs { font-size: var(--text-xs); }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
  </style>
</head>
<body>
  <div id="app">
    <div id="screen-container"></div>
    <nav class="tab-bar" role="tablist" aria-label="Main navigation">
      <button class="tab-item" role="tab" aria-selected="true" data-action="navigate-tab" data-tab="home">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <span>Home</span>
      </button>
      <button class="tab-item" role="tab" aria-selected="false" data-action="navigate-tab" data-tab="search">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <span>Search</span>

const maps = {

  symptomsByVariable: {},   // 'variable-id' → ['symptom-id-1', ...]
};

function buildMaps() {
  // Build symptomsByCluster
  Object.keys(DATA.clusters).forEach(letter => {
    maps.symptomsByCluster[letter] = [];
  });
  Object.entries(DATA.symptoms).forEach(([id, symptom]) => {
    (symptom.clusters || []).forEach(letter => {
      if (maps.symptomsByCluster[letter]) {
        maps.symptomsByCluster[letter].push(id);
      }
    });
  });

  // Build symptomsByVariable
  Object.entries(DATA.symptoms).forEach(([id, symptom]) => {
    (symptom.variables || []).forEach(varId => {
      if (!maps.symptomsByVariable[varId]) {
        maps.symptomsByVariable[varId] = [];
      }
      maps.symptomsByVariable[varId].push(id);
    });
  });
}

// ─── DOM Helpers ──────────────────────────────────────────────────────────
function el(tag, attrs = {}, children = []) {
  const element = document.createElement(tag);
  Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'class') element.className = v;
    else if (k === 'style') Object.assign(element.style, v);
    else if (k.startsWith('data-')) element.dataset[k.slice(5)] = v;
    else if (k === 'aria-selected' || k === 'aria-expanded' || k === 'aria-label' || k === 'aria-hidden' || k === 'role') element.setAttribute(k, v);
    else element[k] = v;
  });
  children.forEach(child => {
    if (typeof child === 'string') element.appendChild(document.createTextNode(child));
    else if (child) element.appendChild(child);
  });
  return element;
}

function txt(text) {
  return document.createTextNode(String(text));
}

function clearEl(element) {
  while (element.firstChild) element.removeChild(element.firstChild);
}

// ─── Plan Utility Functions ───────────────────────────────────────────────
function getActiveClusters(selectedSymptomIds) {
  const clusters = [];
  selectedSymptomIds.forEach(id => {
    const symptom = DATA.symptoms[id];
    if (symptom && symptom.clusters) {
      symptom.clusters.forEach(c => {
        if (!clusters.includes(c)) clusters.push(c);
      });
    }
  });
  return clusters;
}

function getPracticesForClusters(clusters, selectedSymptomIds) {
  const seen = new Set();
  const results = [];
  DATA.dressPractices.forEach(practice => {
    if (practice.clusters.some(c => clusters.includes(c)) && !seen.has(practice.id)) {
      seen.add(practice.id);
      const triggerCount = selectedSymptomIds.filter(id => {
        const symptom = DATA.symptoms[id];
        return symptom && symptom.clusters && symptom.clusters.some(c => practice.clusters.includes(c));
      }).length;
      results.push(Object.assign({}, practice, { score: triggerCount * practice.priority }));
    }
  });
  return results.sort((a, b) => b.score - a.score);
}

function getTopPractices(practices, n) {
  return practices.slice(0, n || 7);
}

function groupByDressComponent(practices) {
  const order = ['diet', 'rest', 'exercise', 'stress', 'supplement'];
  const map = new Map();
  order.forEach(key => map.set(key, []));
  practices.forEach(p => {
    if (map.has(p.dresComponent)) map.get(p.dresComponent).push(p);
  });
  return map;
}

function computeSymptomHash(selectedSymptomIds) {
  return [...selectedSymptomIds].sort().join(',');
}

function getPlanState() {
  try {
    const raw = localStorage.getItem('fdn-plan-state');
    return raw ? JSON.parse(raw) : { completedIds: [], viewMode: 'focus', lastSymptomHash: '' };
  } catch (e) {
    return { completedIds: [], viewMode: 'focus', lastSymptomHash: '' };
  }
}

function setPlanState(state) {
  localStorage.setItem('fdn-plan-state', JSON.stringify(state));
}

function togglePracticeComplete(practiceId) {
  const state = getPlanState();
  const idx = state.completedIds.indexOf(practiceId);
  if (idx === -1) {
    state.completedIds.push(practiceId);
  } else {
    state.completedIds.splice(idx, 1);
  }
  setPlanState(state);
  const card = document.querySelector('.practice-card[data-practice-id="' + practiceId + '"]');
  if (card) {
    const isComplete = state.completedIds.includes(practiceId);
    card.classList.toggle('practice-complete', isComplete);
    const checkbox = card.querySelector('.practice-checkbox');
    if (checkbox) checkbox.setAttribute('aria-pressed', String(isComplete));
  }
}

// ─── Sheet Management ─────────────────────────────────────────────────────
function openSheet(type, id) {
  state.sheet.isOpen = true;
  state.sheet.type = type;
  state.sheet.id = id;
  document.getElementById('bottom-sheet').setAttribute('aria-hidden', 'false');
  document.getElementById('bottom-sheet').classList.add('is-open');
  document.getElementById('bottom-sheet-overlay').classList.add('is-open');
  document.body.style.overflow = 'hidden';
  renderSheetContent(type, id);
  document.getElementById('sheet-content').scrollTop = 0;
}

function closeSheet() {
  state.sheet.isOpen = false;
  state.sheet.stack = [];
  document.getElementById('bottom-sheet').setAttribute('aria-hidden', 'true');
  document.getElementById('bottom-sheet').classList.remove('is-open');
  document.getElementById('bottom-sheet-overlay').classList.remove('is-open');
  document.body.style.overflow = '';
}

function pushSheet(type, id) {
  const current = { type: state.sheet.type, id: state.sheet.id,
    scrollY: document.getElementById('sheet-content').scrollTop };
  state.sheet.stack.push(current);
  state.sheet.type = type;
  state.sheet.id = id;
  renderSheetContent(type, id);
  document.getElementById('sheet-content').scrollTop = 0;
}

function popSheet() {
  if (state.sheet.stack.length === 0) { closeSheet(); return; }
  const prev = state.sheet.stack.pop();
  state.sheet.type = prev.type;
  state.sheet.id = prev.id;
  renderSheetContent(prev.type, prev.id);
  requestAnimationFrame(() => {
    document.getElementById('sheet-content').scrollTop = prev.scrollY;
  });
}

function renderSheetContent(type, id) {
  const content = document.getElementById('sheet-content');
  clearEl(content);
  if (type === 'symptom') renderSymptom(id, content);
  else if (type === 'variable') renderVariable(id, content);
  else if (type === 'cluster') renderCluster(id, content);
}

    type: 'text', class: 'search-input', id: 'home-search-input',

  });

function getSymptomsByCategory() {
  const byCat = {};
  CATEGORY_ORDER.forEach(cat => { byCat[cat] = []; });
  Object.entries(DATA.symptoms).forEach(([id, sym]) => {
    if (byCat[sym.category]) byCat[sym.category].push({ id, ...sym });
  });
  return byCat;
}

function buildAccordions(container, query) {
  clearEl(container);
  const q = query.trim().toLowerCase();
  const isFiltering = q.length >= 2;
  const byCat = getSymptomsByCategory();

  CATEGORY_ORDER.forEach(category => {
    const allSymptoms = byCat[category] || [];
    const symptoms = isFiltering
      ? allSymptoms.filter(s => s.label.toLowerCase().includes(q))
      : allSymptoms;

    if (isFiltering && symptoms.length === 0) return;

    const isExpanded = isFiltering || state.expandedCategories.has(category);
    const section = el('div', { class: 'accordion-section' });

    // Header button
    const headerBtn = el('button', {
      class: 'accordion-header',
      'aria-expanded': String(isExpanded),
      'data-category': category
    });

    const titleSpan = el('span', { class: 'accordion-title' }, [txt(category)]);
    const rightWrap = el('span', { class: 'accordion-right' });

    if (isFiltering && symptoms.length > 0) {
      const badge = el('span', { class: 'accordion-badge' }, [txt(String(symptoms.length))]);
      rightWrap.appendChild(badge);
    }

    const chevron = el('span', { class: 'accordion-chevron' }, [txt('›')]);
    rightWrap.appendChild(chevron);

    headerBtn.appendChild(titleSpan);
    headerBtn.appendChild(rightWrap);
    headerBtn.addEventListener('click', () => toggleAccordion(category, headerBtn, body));
    section.appendChild(headerBtn);

    // Body
    const body = el('div', { class: 'accordion-body' + (isExpanded ? ' is-open' : '') });
    symptoms.forEach(sym => {
      const row = el('button', {
        class: 'list-row',
        'data-action': 'open-symptom',
        'data-id': sym.id
      });
      const label = el('span', { class: 'list-row-label' }, [txt(sym.label)]);
      const chevronRight = el('span', { class: 'list-row-chevron' }, [txt('›')]);
      row.appendChild(label);
      row.appendChild(chevronRight);
      body.appendChild(row);
    });
    section.appendChild(body);
    container.appendChild(section);
  });
}

function refreshAccordions(container, query) {
  buildAccordions(container, query);
}

function toggleAccordion(category, btn, body) {
  const isNowOpen = !body.classList.contains('is-open');
  body.classList.toggle('is-open', isNowOpen);
  btn.setAttribute('aria-expanded', String(isNowOpen));
  if (isNowOpen) state.expandedCategories.add(category);
  else state.expandedCategories.delete(category);
}

function renderSearchResults(container, query) {
  clearEl(container);

      el('p', {}, [txt('Start typing to search symptoms and variables')])
    ]));

  // Search symptoms
  const matchedSymptoms = Object.entries(DATA.symptoms).filter(([, sym]) =>
    sym.label.toLowerCase().includes(q)
  );

  // Search variables
  const matchedVariables = Object.entries(DATA.variables).filter(([, v]) =>
    v.name.toLowerCase().includes(q)
  );

  if (matchedSymptoms.length === 0 && matchedVariables.length === 0) {
    const noMatch = el('div', { class: 'empty-state' });

  // Render symptom results

    container.appendChild(el('p', { class: 'result-group-heading' },
      [txt('Symptoms (' + matchedSymptoms.length + ')')]));

  // Render variable results

// ─── Tab Navigation ───────────────────────────────────────────────────────
function navigateTab(tabName) {
  // Save current scroll position
  if (state.activeTab) {
    state.scrollPositions.set(state.activeTab, document.getElementById('screen-container').scrollTop);
  }

  // Close any open sheet when switching tabs
  if (state.sheet.isOpen) closeSheet();

  state.activeTab = tabName;
  state.screen = tabName;

  // Update tab bar aria-selected states
  document.querySelectorAll('.tab-item').forEach(btn => {
    const isActive = btn.dataset.tab === tabName;
    btn.setAttribute('aria-selected', String(isActive));
  });

  // Render the new screen
  renderScreen(tabName);

  // Restore scroll position for this tab
  requestAnimationFrame(() => {
    const savedScroll = state.scrollPositions.get(tabName) || 0;
    document.getElementById('screen-container').scrollTop = savedScroll;
  });
}

function renderScreen(screenName) {
  const container = document.getElementById('screen-container');
  clearEl(container);
  const screenDiv = el('div', { class: 'screen screen-enter' });
  if (screenName === 'home') renderHome(screenDiv);
  else if (screenName === 'search') renderSearch(screenDiv);
  else if (screenName === 'clusters') renderClusters(screenDiv);
  container.appendChild(screenDiv);
}

// ─── Event Delegation ─────────────────────────────────────────────────────
document.addEventListener('click', function handleClick(e) {
  // Walk up the DOM tree to find the element with data-action
  let target = e.target;
  while (target && target !== document.body) {
    const action = target.dataset && target.dataset.action;
    if (action) {
      const id = target.dataset.id;
      switch (action) {
        case 'navigate-tab':
          navigateTab(target.dataset.tab);
          return;
        case 'open-symptom':
          if (!id) return;
          if (state.sheet.isOpen) pushSheet('symptom', id);
          else openSheet('symptom', id);
          return;
        case 'open-variable':
          if (!id) return;
          if (state.sheet.isOpen) pushSheet('variable', id);
          else openSheet('variable', id);
          return;
        case 'open-cluster':
          if (!id) return;
          if (state.sheet.isOpen) pushSheet('cluster', id);
          else openSheet('cluster', id);
          return;
        case 'go-back':
          popSheet();
          return;
        case 'close-sheet':
          closeSheet();
          return;
        default:
          break;
      }
    }
    target = target.parentElement;
  }
});

// Close sheet on Escape key
document.addEventListener('keydown', function handleKeydown(e) {
  if (e.key === 'Escape' && state.sheet.isOpen) {
    closeSheet();
  }
});

  buildMaps();

}
